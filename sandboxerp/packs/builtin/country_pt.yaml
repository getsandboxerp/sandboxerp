# Country Pack — Portugal
# Layers: 1 (country) + 2 (localization)
# Author: Hector Colina / Team360 <https://team360.cl>
# SPDX-License-Identifier: MIT

# ─────────────────────────────────────────
# meta
# ─────────────────────────────────────────
meta:
  code: pt
  name: Portugal
  locale: pt_PT          # Faker locale for names, addresses, etc.
  layers: [1, 2]

# ─────────────────────────────────────────
# localization  (Layer 2)
# ─────────────────────────────────────────
localization:
  odoo_modules:
    install_order:
      - l10n_pt            # base: chart of accounts, taxes, fiscal positions
  chart_of_accounts: l10n_pt
  currency: EUR
  language: pt_PT
  country_code: PT
  post_install:
    - set_currency: EUR
    - set_language: pt_PT
    - set_country: PT

# ─────────────────────────────────────────
# fiscal  (Layer 1)
# ─────────────────────────────────────────
fiscal:
  tax_name: IVA
  tax_rate: 0.23
  tax_account: IVA a entregar ao Estado
  id_label: NIF
  id_format: "XXXXXXXXX"           # 9 digits (e.g. 123456789)
  faker_person_id: vat_id           # Faker pt_PT method — generates PT + 9 digits
  faker_company_id: vat_id          # same method for companies

# ─────────────────────────────────────────
# partner_fields
# PT has no l10n_latam dependency. identification_type_name is left
# empty so installer.py skips the l10n_latam.identification.type lookup.
# No country-specific taxpayer fields are required for l10n_pt to allow
# action_post — standard VAT field is sufficient.
# vat_generators._pt_nif is used to generate valid mod-11 NIFs.
# ─────────────────────────────────────────
partner_fields:
  vat_prefix: "PT"                  # Odoo EU VAT format: PT + 9 digits
  identification_type_name: ""      # no l10n_latam — installer skips lookup
  company_taxpayer_field: ""        # no extra field required by l10n_pt
  company_taxpayer_value: ""
  person_taxpayer_field: ""
  person_taxpayer_value: ""

