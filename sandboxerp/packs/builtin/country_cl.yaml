# Country Pack — Chile
# Layers: 1 (country) + 2 (localization)
# Author: Hector Colina / Team360 <https://team360.cl>
# SPDX-License-Identifier: MIT

# ─────────────────────────────────────────
# meta
# ─────────────────────────────────────────
meta:
  code: cl
  name: Chile
  locale: es_CL          # Faker locale for names, addresses, etc.
  layers: [1, 2]

# ─────────────────────────────────────────
# localization  (Layer 2)
# ─────────────────────────────────────────
localization:
  odoo_modules:
    install_order:
      - l10n_cl            # base: chart of accounts, taxes, fiscal positions
      - l10n_cl_edi        # electronic invoicing (DTE / SII)
      - l10n_cl_reports    # F29, Balance Tributario 8 columnas
  chart_of_accounts: l10n_cl
  currency: CLP
  language: es_CL
  country_code: CL
  post_install:
    - set_currency: CLP
    - set_language: es_CL
    - set_country: CL

# ─────────────────────────────────────────
# fiscal  (Layer 1)
# ─────────────────────────────────────────
fiscal:
  tax_name: IVA
  tax_rate: 0.19
  tax_account: IVA Débito Fiscal
  id_label: RUT
  id_format: "XX.XXX.XXX-X"        # display format with dots and dash
  faker_person_id: person_rut       # Faker es_CL method for person RUT
  faker_company_id: company_rut     # Faker es_CL method for company RUT
  sii_environment: certification    # 'certification' for sandbox, 'production' for live

# ─────────────────────────────────────────
# taxpayer_types  (required by l10n_cl_edi)
# ─────────────────────────────────────────
taxpayer_types:
  - code: "1"
    label: 1ª Categoría
    description: Empresa o persona que tributa en primera categoría (renta efectiva)
    odoo_field: l10n_cl_sii_taxpayer_type
    default: true
  - code: "2"
    label: 2ª Categoría
    description: Persona natural que tributa en segunda categoría (honorarios)
    odoo_field: l10n_cl_sii_taxpayer_type
  - code: "3"
    label: Boleta
    description: Consumidor final (persona natural sin actividad comercial)
    odoo_field: l10n_cl_sii_taxpayer_type
  - code: "4"
    label: Extranjero
    description: Entidad o persona sin RUT chileno
    odoo_field: l10n_cl_sii_taxpayer_type

# ─────────────────────────────────────────
# document_types  (DTE / SII codes)
# ─────────────────────────────────────────
document_types:
  - code: 33
    name: Factura Electrónica
    short: factura
    affects_vat: true
    b2b: true
    b2c: false
    default_sale: true
  - code: 34
    name: Factura No Afecta o Exenta Electrónica
    short: factura_exenta
    affects_vat: false
    b2b: true
    b2c: false
  - code: 39
    name: Boleta Electrónica
    short: boleta
    affects_vat: true
    b2b: false
    b2c: true
    default_pos: true
  - code: 41
    name: Boleta Exenta Electrónica
    short: boleta_exenta
    affects_vat: false
    b2b: false
    b2c: true
  - code: 46
    name: Factura de Compra Electrónica
    short: factura_compra
    affects_vat: true
    b2b: true
    b2c: false
  - code: 52
    name: Guía de Despacho Electrónica
    short: guia_despacho
    affects_vat: false
    b2b: true
    b2c: false
  - code: 56
    name: Nota de Débito Electrónica
    short: nota_debito
    affects_vat: true
    b2b: true
    b2c: true
  - code: 61
    name: Nota de Crédito Electrónica
    short: nota_credito
    affects_vat: true
    b2b: true
    b2c: true

