# Country Pack — Mexico
# Layers: 1 (country) + 2 (localization)
# Author: Hector Colina / Team360 <https://team360.cl>
# SPDX-License-Identifier: MIT

# ─────────────────────────────────────────
# meta
# ─────────────────────────────────────────
meta:
  code: mx
  name: Mexico
  locale: es_MX          # Faker locale for names, addresses, etc.
  layers: [1, 2]

# ─────────────────────────────────────────
# localization  (Layer 2)
# ─────────────────────────────────────────
localization:
  odoo_modules:
    install_order:
      - l10n_mx            # base: chart of accounts SAT, taxes, fiscal positions
      - l10n_mx_edi        # electronic invoicing (CFDI 4.0)
      - l10n_mx_reports    # reportes obligatorios SAT (DIOT, etc.)
  chart_of_accounts: l10n_mx
  currency: MXN
  language: es_MX
  country_code: MX
  post_install:
    - set_currency: MXN
    - set_language: es_MX
    - set_country: MX

# ─────────────────────────────────────────
# fiscal  (Layer 1)
# ─────────────────────────────────────────
fiscal:
  tax_name: IVA
  tax_rate: 0.16
  tax_account: IVA Trasladado
  id_label: RFC
  id_format: "AAAA######XXX"        # 12 chars moral / 13 chars física (letras+fecha+homoclave)
  faker_person_id: rfc               # Faker es_MX method — fake.rfc(natural=True)
  faker_company_id: rfc              # Faker es_MX method — fake.rfc(natural=False)
  sat_environment: test              # 'test' for sandbox, 'production' for live

# ─────────────────────────────────────────
# taxpayer_types  (regímenes fiscales SAT — CFDI 4.0)
# ─────────────────────────────────────────
taxpayer_types:
  - code: "601"
    label: General de Ley Personas Morales
    description: Empresas que tributan en régimen general
    odoo_field: l10n_mx_edi_fiscal_regime
    default: true
  - code: "612"
    label: Personas Físicas con Actividades Empresariales y Profesionales
    description: Persona física con actividad empresarial o profesional
    odoo_field: l10n_mx_edi_fiscal_regime
  - code: "626"
    label: Régimen Simplificado de Confianza
    description: RESICO — personas físicas con ingresos hasta 3.5 MDP anuales
    odoo_field: l10n_mx_edi_fiscal_regime
  - code: "616"
    label: Sin Obligaciones Fiscales
    description: Consumidor final sin actividad comercial registrada
    odoo_field: l10n_mx_edi_fiscal_regime

# ─────────────────────────────────────────
# document_types  (tipos de CFDI)
# ─────────────────────────────────────────
document_types:
  - code: I
    name: Ingreso
    short: factura
    affects_vat: true
    b2b: true
    b2c: true
    default_sale: true
  - code: E
    name: Egreso
    short: nota_credito
    affects_vat: true
    b2b: true
    b2c: true
  - code: P
    name: Pago
    short: complemento_pago
    affects_vat: false
    b2b: true
    b2c: false
  - code: T
    name: Traslado
    short: carta_porte
    affects_vat: false
    b2b: true
    b2c: false

