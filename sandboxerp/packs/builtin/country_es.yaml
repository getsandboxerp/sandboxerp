# Country Pack — Spain
# Layers: 1 (country) + 2 (localization)
# Author: Hector Colina / Team360 <https://team360.cl>
# SPDX-License-Identifier: MIT

# ─────────────────────────────────────────
# meta
# ─────────────────────────────────────────
meta:
  code: es
  name: Spain
  locale: es_ES
  layers: [1, 2]

# ─────────────────────────────────────────
# localization  (Layer 2)
# ─────────────────────────────────────────
localization:
  odoo_modules:
    install_order:
      - l10n_es
  chart_of_accounts: l10n_es
  currency: EUR
  language: es_ES
  country_code: ES
  post_install:
    - set_currency: EUR
    - set_language: es_ES
    - set_country: ES

# ─────────────────────────────────────────
# fiscal  (Layer 1)
# ─────────────────────────────────────────
fiscal:
  tax_name: IVA
  tax_rate: 0.21
  tax_account: IVA repercutido
  id_label: NIF
  id_format: "XXXXXXXXX"
  faker_person_id: nif
  faker_company_id: nif

# ─────────────────────────────────────────
# partner_fields
# ES has no l10n_latam dependency.
# vat_generators._es_nif / _es_cif used for valid control letter/digit.
# ─────────────────────────────────────────
partner_fields:
  vat_prefix: "ES"
  identification_type_name: ""
  company_taxpayer_field: ""
  company_taxpayer_value: ""
  person_taxpayer_field: ""
  person_taxpayer_value: ""

# ─────────────────────────────────────────
# banks  (principales bancos España — Banco de España)
# ─────────────────────────────────────────
banks:
  - code: "0049"
    name: Banco Santander
    short: Santander
    swift: BSCHESMMXXX
  - code: "0182"
    name: BBVA
    short: BBVA
    swift: BBVAESMMXXX
  - code: "2100"
    name: CaixaBank
    short: CaixaBank
    swift: CAIXESBBXXX
  - code: "0081"
    name: Banco Sabadell
    short: Sabadell
    swift: BSABESBBXXX
  - code: "0128"
    name: Bankinter
    short: Bankinter
    swift: BKBKESMMXXX
  - code: "2038"
    name: Bankia (CaixaBank)
    short: Bankia
    swift: CAHMESMMXXX
  - code: "0073"
    name: Banco Openbank
    short: Openbank
    swift: OPENESMMXXX
  - code: "1465"
