# Country Pack — Netherlands
# Layers: 1 (country) + 2 (localization)
# Author: Hector Colina / Team360 <https://team360.cl>
# SPDX-License-Identifier: MIT

# ─────────────────────────────────────────
# meta
# ─────────────────────────────────────────
meta:
  code: nl
  name: Netherlands
  locale: nl_NL          # Faker locale for names, addresses, etc.
  layers: [1, 2]

# ─────────────────────────────────────────
# localization  (Layer 2)
# ─────────────────────────────────────────
localization:
  odoo_modules:
    install_order:
      - l10n_nl            # base: chart of accounts, taxes, fiscal positions
  chart_of_accounts: l10n_nl
  currency: EUR
  language: nl_NL
  country_code: NL
  post_install:
    - set_currency: EUR
    - set_language: nl_NL
    - set_country: NL

# ─────────────────────────────────────────
# fiscal  (Layer 1)
# ─────────────────────────────────────────
fiscal:
  tax_name: BTW
  tax_rate: 0.21
  tax_account: BTW af te dragen
  id_label: BTW-nummer
  id_format: "NLXXXXXXXXX B XX"    # NL + 9 digits + B + 2 digits (e.g. NL123456789B01)
  faker_person_id: ssn              # Faker nl_NL ssn → BSN (Burgerservicenummer)
  faker_company_id: ssn             # No dedicated company VAT method in Faker nl_NL
  vat_format: "NL#########B##"      # numerify pattern — generates valid BTW-nummer format

# ─────────────────────────────────────────
# partner_fields
# NL has no l10n_latam dependency. identification_type_name is left
# empty so installer.py skips the l10n_latam.identification.type lookup.
# No country-specific taxpayer fields are required for l10n_nl to allow
# action_post — standard VAT field is sufficient.
# ─────────────────────────────────────────
partner_fields:
  vat_prefix: "NL"                  # Odoo EU VAT format: NL + BSN digits
  identification_type_name: ""      # no l10n_latam — installer skips lookup
  company_taxpayer_field: ""        # no extra field required by l10n_nl
  company_taxpayer_value: ""
  person_taxpayer_field: ""
  person_taxpayer_value: ""

# ─────────────────────────────────────────
# banks  (principales bancos Países Bajos — DNB)
